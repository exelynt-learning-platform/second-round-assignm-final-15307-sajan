# database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/E-commerce
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT configuration
jwt.secret=${JWT_SECRET:5a2f8c9d3e7b1a4f6c8d2e9b3a7f1c4d5e8a2b6c9d3f7e1a4b8c2d6e9f3a7b}
jwt.expiration=86400000

# Razorpay configuration
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_XXXXXXXXXXXX}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:XXXXXXXXXXXXXXXXXXXXXXXX}

# server configuration
server.port=8089
spring.application.name=ecommerce-backend
